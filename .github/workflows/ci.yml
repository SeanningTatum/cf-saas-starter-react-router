name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Baseline (typecheck + test + harness-check)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply local D1 migrations
        run: bun run db:migrate:local

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Harness invariants
        run: ./scripts/harness-check.sh

  build:
    name: Build (Cloudflare Workers)
    runs-on: ubuntu-latest
    needs: baseline
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: baseline
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply local D1 migrations
        run: bun run db:migrate:local

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  effect-ts-grep:
    name: Five non-negotiables grep sweep
    runs-on: ubuntu-latest
    needs: baseline
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diff vs base
        id: diff
        run: |
          BASE_REF="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          echo "base=$BASE_REF" >> "$GITHUB_OUTPUT"

      - name: Grep diff for non-negotiable violations
        run: |
          set -euo pipefail
          BASE="${{ steps.diff.outputs.base }}"
          DIFF=$(git diff "$BASE"...HEAD -- 'app/**/*.ts' 'app/**/*.tsx' 'workers/**/*.ts' || true)
          if [ -z "$DIFF" ]; then
            echo "No app/worker TS changes — skipping."
            exit 0
          fi
          ADDED=$(echo "$DIFF" | grep -E '^\+' | grep -vE '^\+\+\+' || true)
          VIOLATIONS=""
          if echo "$ADDED" | grep -E '\bthrow new\b' | grep -vE 'tryPromise|test|spec|//|throw new Error\(`unhandled tagged'; then
            VIOLATIONS="$VIOLATIONS\n- Bare \`throw\` (use Effect.fail)"
          fi
          if echo "$ADDED" | grep -E 'process\.env'; then
            VIOLATIONS="$VIOLATIONS\n- process.env (use CloudflareEnv Tag)"
          fi
          if echo "$ADDED" | grep -E 'from "zod"|from \"zod/'; then
            VIOLATIONS="$VIOLATIONS\n- Zod import (use Effect Schema)"
          fi
          if [ -n "$VIOLATIONS" ]; then
            printf "Five non-negotiables violated:%s\n" "$VIOLATIONS"
            exit 1
          fi
          echo "Non-negotiables sweep clean."
